<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIN PAYMENT</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="container">

<div class="header">
<h1>💳 DIN PAYMENT</h1>
<p>Payment Dashboard</p>
</div>

<div class="card">
<h2>Saldo</h2>

<h1 id="saldo">Rp 0</h1>

<button onclick="cekSaldo()">
Refresh Saldo
</button>

</div>

<div class="card">

<h2>Deposit QRIS</h2>

<input
type="number"
id="depositNominal"
placeholder="Masukkan nominal">

<button onclick="deposit()">
Buat QRIS
</button>

<div id="depositResult"></div>

</div>

<div class="card">

<h2>Withdraw</h2>

<select id="wallet">

<option value="dana">DANA</option>

<option value="ovo">OVO</option>

<option value="gopay">GoPay</option>

<option value="shopeepay">ShopeePay</option>

</select>

<input
type="text"
id="nomor"
placeholder="Nomor Tujuan">

<input
type="number"
id="nominal"
placeholder="Nominal">

<button onclick="withdraw()">
Tarik Saldo
</button>

</div>

<div class="card">

<h2>Riwayat Transaksi</h2>

<button onclick="riwayat()">
Refresh Riwayat
</button>

<div id="history">
Belum ada data
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
